apiVersion: v1
kind: Service
metadata:
  name: vault
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
  clusterIP: None

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  selector:
    matchLabels:
      app: vault
  serviceName: vault
  replicas: 1
  template:
    metadata:
      labels:
        app: vault
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: vault
        image: vault:1.13.3
        securityContext:
          capabilities:
            add: [IPC_LOCK]
        args:
          - server
          - -config=/etc/vault/vault.json
        readinessProbe:
          exec:
            command:
              - wget
              - --spider
              - http://127.0.0.1:8200/v1/sys/health
        livenessProbe:
          initialDelaySeconds: 120
          exec:
            command:
              - wget
              - --spider
              - http://127.0.0.1:8200/v1/sys/health
        volumeMounts:
          - name: vault-json
            mountPath: /etc/vault
          - name: vault-vol
            mountPath: /vault/file
        env:
          - name: VAULT_ADDR
            value: http://127.0.0.1:8200
          - name: VAULT_API_ADDR
            value: http://127.0.0.1:8200
          - name: VAULT_ADDRESS
            value: http://127.0.0.1:8200
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
        ports:
        - containerPort: 8200
      
      volumes:
        - name: vault-json
          configMap:
            name: vault-json

  volumeClaimTemplates:
  - metadata:
      name: vault-vol
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
