apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-json
data:
  vault.json: |
    {
      "listener": {
        "tcp": {
          "address": "0.0.0.0:8200",
          "cluster_address": "0.0.0.0:8201",
          "tls_disable": 1
        }
      },
      "backend": {
        "file": {
          "path": "/vault/file"
        }
      },
      "api_addr": "http://127.0.0.1:8200",
      "cluster_addr": "http://127.0.0.1:8201",
      "ui": "true",
      "disable_mlock": "true"
    }

