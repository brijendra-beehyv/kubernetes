apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: LoadBalancer
  selector:
    app: myapp
  ports:
  - name: p1
    port: 8080
    targetPort: 8080
  - name: p2
    port: 9990
    targetPort: 9990

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: ghcr.io/sunbird-rc/sunbird-rc-keycloak:latest
        readinessProbe:
          exec:
            command: [curl, -f, http://localhost:9990/]
        volumeMounts:
          - name: keycloak-vol
            mountPath: /opt/jboss/keycloak/imports
        envFrom:
          - configMapRef:
              name: keycloak
        ports:
        - containerPort: 9990
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
      
      volumes:
        - name: keycloak-vol
          configMap:
            name: keycloak-config