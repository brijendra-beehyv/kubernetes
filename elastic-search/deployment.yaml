apiVersion: v1
kind: Service
metadata:
  name: es
spec:
  selector:
    app: es
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: transport
    port: 9300
    targetPort: 9300
  clusterIP: None

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es
spec:
  selector:
    matchLabels:
      app: es
  serviceName: es
  replicas: 1
  template:
    metadata:
      labels:
        app: es
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data

      containers:
      - name: es
        image: docker.elastic.co/elasticsearch/elasticsearch:6.8.23
        ports:
          - containerPort: 9200
          - containerPort: 9300
        envFrom:
        - secretRef:
            name: es-secret
        readinessProbe:
          exec:
            command:
              - curl
              - localhost:9200/_cluster/health
              - --header
              - "Authorization: Basic ZWxhc3RpYzpEa0llZFBQU0Ni"
          initialDelaySeconds: 60
        livenessProbe:
          exec:
            command:
              - curl
              - localhost:9200/_cluster/health
              - --header
              - "Authorization: Basic ZWxhc3RpYzpEa0llZFBQU0Ni"
          initialDelaySeconds: 120
        volumeMounts:
          - mountPath: /usr/share/elasticsearch/data
            name: data

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
