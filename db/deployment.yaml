apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  serviceName: db
  replicas: 1
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: postgres
        volumeMounts:
          - mountPath: /var/lib/postgresql/
            name: db-vol
        ports:
          - containerPort: 5432
        env:
          - name: POSTGRES_DB
            value: registry
          - name: POSTGRES_USER
            value: postgres
          - name: POSTGRES_PASSWORD
            value: postgres
        readinessProbe:
          exec:
            command:
              - pg_isready
              - -U
              - postgres
        livenessProbe:
          exec:
            command:
              - pg_isready
              - -U
              - postgres
          initialDelaySeconds: 60
        resources:
          requests:
            memory: 256Mi
            cpu: 50m

  volumeClaimTemplates:
  - metadata:
      name: db-vol
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
