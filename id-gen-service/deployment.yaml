apiVersion: v1
kind: Service
metadata:
  name: id-gen-service
spec:
  selector:
    app: id-gen-service
  ports:
  - port: 8088
    targetPort: 8088

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: id-gen-service
data:
  spring.datasource.url: jdbc:postgresql://db:5432/registry
  spring.flyway.baseline-on-migrate: "true"
  autocreate.new.seq: "true"
  idformat.from.mdms: "false"
  egov.mdms.provider: org.egov.id.masterdata.provider.DBMasterDataProvider

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: id-gen-service
spec:
  selector:
    matchLabels:
      app: id-gen-service
  template:
    metadata:
      labels:
        app: id-gen-service
    spec:
      containers:
      - name: id-gen-service
        image: ghcr.io/sunbird-rc/id-gen-service:v2.0.0
        envFrom:
          - configMapRef:
              name: id-gen-service
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
        ports:
        - containerPort: 8088
